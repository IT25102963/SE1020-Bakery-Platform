# ── Server ────────────────────────────────────────────────
spring.application.name=BakeryFeedback
server.port=8080

# ── File Storage (reviews saved here) ─────────────────────
# The reviews.txt file will be created automatically in the
# project root folder when the first review is submitted.
app.reviews.file=reviews.txt

# ── Thymeleaf ─────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Devtools (avoid repeated auto-restarts during IDE builds)
spring.devtools.restart.enabled=false

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Leave a Review – Sweet Layers Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
    <style>
        /* ── CSS Variables ─────────────────────────────────────── */
        :root {
            --cream:   #fdf6ec;
            --brown:   #5c3317;
            --rose:    #c0392b;
            --gold:    #d4a84b;
            --soft:    #f9ede0;
            --border:  #e8d5c0;
            --text:    #3a2010;
            --muted:   #9a7a60;
            --shadow:  0 4px 24px rgba(92,51,23,0.10);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--cream);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(212,168,75,0.07) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(192,57,43,0.05) 0%, transparent 50%);
            min-height: 100vh;
            color: var(--text);
        }

        /* ── Navigation ────────────────────────────────────────── */
        nav {
            background: var(--brown);
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .nav-brand {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 22px;
            text-decoration: none;
        }
        .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            margin-left: 28px;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); }

        /* ── Page Header ───────────────────────────────────────── */
        .page-header {
            text-align: center;
            padding: 52px 20px 32px;
        }
        .page-header .icon { font-size: 48px; margin-bottom: 12px; }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: var(--brown);
            margin-bottom: 10px;
        }
        .page-header p {
            color: var(--muted);
            font-size: 16px;
            font-weight: 300;
        }

        /* ── Alert Messages ────────────────────────────────────── */
        .alert {
            max-width: 560px;
            margin: 0 auto 24px;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 400;
            border-left: 4px solid;
        }
        .alert-success {
            background: #eafaf1;
            border-color: #27ae60;
            color: #1e8449;
        }
        .alert-error {
            background: #fdedec;
            border-color: var(--rose);
            color: var(--rose);
        }

        /* ── Form Card ─────────────────────────────────────────── */
        .form-card {
            background: white;
            max-width: 560px;
            margin: 0 auto;
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 22px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 7px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'Lato', sans-serif;
            font-size: 15px;
            color: var(--text);
            background: var(--soft);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input[type="text"]:focus,
        textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,168,75,0.15);
            background: white;
        }
        textarea { resize: vertical; min-height: 120px; }

        /* ── Star Rating ───────────────────────────────────────── */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            gap: 6px;
            justify-content: flex-end;
            margin-top: 4px;
        }
        .star-rating input { display: none; }
        .star-rating label {
            font-size: 32px;
            color: #ddd;
            cursor: pointer;
            transition: color 0.15s;
            text-transform: none;
            letter-spacing: 0;
            font-weight: normal;
            margin: 0;
        }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: var(--gold);
        }

        /* ── Submit Button ─────────────────────────────────────── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--brown);
            color: white;
            font-family: 'Lato', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-submit:hover  { background: var(--rose); }
        .btn-submit:active { transform: scale(0.99); }

        /* ── Footer Links ──────────────────────────────────────── */
        .footer-links {
            text-align: center;
            padding: 28px;
            font-size: 14px;
            color: var(--muted);
        }
        .footer-links a {
            color: var(--brown);
            text-decoration: none;
            font-weight: 700;
            margin: 0 10px;
        }
        .footer-links a:hover { color: var(--rose); }

        /* ── Divider ───────────────────────────────────────────── */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 28px 0;
        }

        /* ── My Reviews (CRUD) ─────────────────────────────────── */
        .reviews-card {
            background: white;
            max-width: 980px;
            margin: 26px auto 0;
            border-radius: 16px;
            padding: 26px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .reviews-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--brown);
            font-size: 22px;
            margin-bottom: 6px;
        }

        .reviews-card p {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 14px;
        }

        table { width: 100%; border-collapse: collapse; }
        thead th {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            padding: 10px 12px;
            background: rgba(212,168,75,0.10);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        tbody td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            font-size: 14px;
        }
        .td-id { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; color: var(--muted); font-size: 12px; }
        .td-stars { color: var(--gold); letter-spacing: 1px; white-space: nowrap; }
        .td-comment { color: rgba(58,32,16,0.80); max-width: 360px; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.3px;
            border: 1px solid var(--border);
            background: var(--soft);
            color: var(--brown);
        }
        .badge-approved { border-color: rgba(39,174,96,0.35); color: #1e8449; background: rgba(39,174,96,0.10); }
        .badge-pending  { border-color: rgba(230,126,34,0.35); color: #a65f00; background: rgba(230,126,34,0.10); }

        .row-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-mini {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            background: white;
            padding: 7px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
            color: var(--brown);
            text-decoration: none;
        }
        .btn-mini:hover { border-color: rgba(212,168,75,0.8); }
        .btn-mini-danger { border-color: rgba(192,57,43,0.35); color: var(--rose); }
        .btn-mini-danger:hover { border-color: rgba(192,57,43,0.65); }

        .empty {
            padding: 18px;
            border: 1px dashed var(--border);
            border-radius: 14px;
            background: rgba(255,255,255,0.6);
            color: var(--muted);
        }
    </style>
</head>
<body>

<!-- ── Navigation ───────────────────────────────────────────── -->
<nav>
    <a class="nav-brand" href="#">🍰 Sweet Layers Bakery</a>
    <div class="nav-links">
        <a href="/reviews/new"          class="active">Write a Review</a>
        <a href="/reviews/manage"                 >Manage Reviews</a>
        <a href="/reviews/testimonials"            >Testimonials</a>
        <a href="/reviews/admin"                   >Admin Panel</a>
    </div>
</nav>

<!-- ── Page Header ──────────────────────────────────────────── -->
<div class="page-header">
    <div class="icon">✍️</div>
    <h1>Share Your Experience</h1>
    <p>Your feedback helps us bake better. We'd love to hear from you!</p>
</div>

<!-- ── Flash Messages ───────────────────────────────────────── -->
<div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
<div th:if="${errorMsg}"   class="alert alert-error"   th:text="${errorMsg}"></div>

<!-- ── Submit Review Form ───────────────────────────────────── -->
<div class="form-card">

    <!--
        THYMELEAF: th:action="@{/reviews/new}" generates the correct URL.
        METHOD=POST → triggers the @PostMapping in ReviewController.
    -->
    <form action="/reviews/new" method="post">

        <!-- Customer Name -->
        <div class="form-group">
            <label for="customerName">Your Full Name</label>
            <input type="text" id="customerName" name="customerName"
                   placeholder="e.g. Amal Perera" required maxlength="100"/>
        </div>

        <!-- Cake Name -->
        <div class="form-group">
            <label for="cakeName">Cake / Product Name</label>
            <input type="text" id="cakeName" name="cakeName"
                   placeholder="e.g. Chocolate Fudge Cake" required maxlength="100"/>
        </div>

        <!-- Star Rating -->
        <div class="form-group">
            <label>Your Rating</label>
            <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5" required/><label for="star5" title="Excellent">★</label>
                <input type="radio" id="star4" name="rating" value="4"/><label for="star4" title="Good">★</label>
                <input type="radio" id="star3" name="rating" value="3"/><label for="star3" title="Average">★</label>
                <input type="radio" id="star2" name="rating" value="2"/><label for="star2" title="Poor">★</label>
                <input type="radio" id="star1" name="rating" value="1"/><label for="star1" title="Terrible">★</label>
            </div>
        </div>

        <!-- Comment -->
        <div class="form-group">
            <label for="comment">Your Review</label>
            <textarea id="comment" name="comment"
                      placeholder="Tell us what you loved (or what we can improve)..."
                      required maxlength="500"></textarea>
        </div>

        <hr class="divider"/>

        <!-- Submit -->
        <button type="submit" class="btn-submit">Submit My Review</button>
    </form>
</div>

<!-- ── Footer Links ─────────────────────────────────────────── -->
<div class="footer-links">
    <a href="/reviews/testimonials">📋 View All Testimonials</a>
    <a href="/reviews/admin">🛡️ Admin Panel</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Receipt | CakeForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        @media print {
            .no-print { display: none !important; }
            .glass-card { box-shadow: none; border: 1px solid #ddd; }
            body { background: white; }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg cake-navbar no-print">
    <div class="container">
        <a class="navbar-brand" th:href="@{/bookings/products}">
            <img th:src="@{/theme/img/logo.png}" alt="CakeForge" class="brand-logo">
            <span>CakeForge</span>
        </a>
    </div>
</nav>

<main class="container py-5">
    <div class="glass-card max-width-700 mx-auto p-5 receipt-print">
        <div class="text-center mb-5">
            <img th:src="@{/theme/img/logo.png}" alt="Logo" style="width: 80px;" class="mb-3">
            <h2 class="fw-bold text-pink">Order Receipt</h2>
            <p class="text-muted">CakeForge Studio - Handcrafted Artisanal Cakes</p>
            <div class="badge bg-light text-dark border p-2 mt-2">
                Booking ID: <span th:text="${booking.bookingId}"></span>
            </div>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-6">
                <h6 class="text-muted text-uppercase small fw-bold">Customer Details</h6>
                <p class="mb-1 fw-bold" th:text="${booking.customerName}"></p>
                <p class="mb-0 text-muted" th:text="${booking.phone}"></p>
            </div>
            <div class="col-6 text-end">
                <h6 class="text-muted text-uppercase small fw-bold">Order Info</h6>
                <p class="mb-1"><span class="fw-bold">Date:</span> <span th:text="${#temporals.format(booking.bookingDate, 'MMM dd, yyyy')}"></span></p>
                <p class="mb-0"><span class="fw-bold">Type:</span> <span th:text="${booking.orderType}"></span></p>
            </div>
        </div>

        <div class="table-responsive mb-4">
            <table class="table border">
                <thead class="bg-light">
                    <tr>
                        <th>Description</th>
                        <th class="text-center">Qty</th>
                        <th class="text-end">Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="fw-bold" th:text="${booking.cakeName}"></div>
                            <small class="text-muted" th:text="${booking.orderDetails}"></small>
                        </td>
                        <td class="text-center" th:text="${booking.quantity}"></td>
                        <td class="text-end fw-bold" th:text="${'LKR ' + #numbers.formatDecimal(booking.totalPrice, 1, 'COMMA', 2, 'POINT')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="text-end mb-5">
            <h4 class="fw-bold text-pink">Total: <span th:text="${'LKR ' + #numbers.formatDecimal(booking.totalPrice, 1, 'COMMA', 2, 'POINT')}"></span></h4>
        </div>

        <div class="text-center border-top pt-4">
            <p class="text-muted small">Thank you for choosing CakeForge Studio!</p>
            <p class="text-muted small mb-0">Delivery Date: <span class="fw-bold" th:text="${#temporals.format(booking.deliveryDate, 'MMM dd, yyyy')}"></span></p>
        </div>
    </div>

    <div class="text-center mt-4 no-print">
        <button onclick="window.print()" class="btn btn-primary btn-lg px-5 rounded-pill shadow">
            <i class="fa-solid fa-print me-2"></i> Print Receipt
        </button>
        <a th:href="@{/bookings/my-orders}" class="btn btn-light btn-lg border px-5 rounded-pill ms-3">Back to Bookings</a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

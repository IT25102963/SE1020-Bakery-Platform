<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reviews | CakeForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg cake-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/catalog}">
            <img th:src="@{/theme/img/logo.png}" alt="CakeForge" class="brand-logo">
            <span>CakeForge</span>
        </a>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/catalog}">Catalog</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/reviews/new}">Write Review</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/reviews/manage}">My Reviews</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/reviews/testimonials}">Read Reviews</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="page-header container">
    <h1>My Reviews</h1>
    <p>Edit or remove your submitted reviews.</p>
</header>

<main class="container py-4">
    <div th:if="${successMsg}" class="alert alert-success glass-card border-0" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger glass-card border-0" th:text="${errorMsg}"></div>

    <div class="glass-card p-0 overflow-hidden">
        <div class="p-4 border-bottom d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">Submitted Reviews</h5>
            <a th:href="@{/reviews/new}" class="btn btn-primary rounded-pill px-4">
                <i class="fa-solid fa-plus me-2"></i>Add Review
            </a>
        </div>

        <div class="table-responsive" th:if="${reviews != null and !reviews.isEmpty()}">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Review ID</th>
                    <th>Cake</th>
                    <th>Rating</th>
                    <th>Comment</th>
                    <th>Status</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${reviews}">
                    <td th:text="${r.reviewId}">RV-XXXX</td>
                    <td th:text="${r.cakeName}">Cake</td>
                    <td th:text="${r.stars}">⭐⭐⭐⭐⭐</td>
                    <td class="text-muted" th:text="${r.comment}">Comment</td>
                    <td>
                        <span class="badge bg-success-subtle text-success border" th:if="${r.approved}">Approved</span>
                        <span class="badge bg-warning-subtle text-warning border" th:unless="${r.approved}">Pending</span>
                    </td>
                    <td class="text-center">
                        <div class="d-inline-flex gap-2">
                            <a th:href="@{/reviews/edit/{id}(id=${r.reviewId})}" class="btn btn-light border btn-sm">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                            <form th:action="@{/reviews/delete/{id}(id=${r.reviewId})}" method="post"
                                  onsubmit="return confirm('Delete this review?')">
                                <button class="btn btn-outline-danger btn-sm" type="submit">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${reviews == null or reviews.isEmpty()}" class="text-center py-5 text-muted">
            <i class="fa-solid fa-comment-slash fa-2x mb-3"></i>
            <p class="mb-0">You have not submitted any reviews yet.</p>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

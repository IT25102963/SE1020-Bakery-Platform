<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Review (Admin) | CakeForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg cake-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/standard-catalog}">
            <img th:src="@{/theme/img/logo.png}" alt="CakeForge" class="brand-logo">
            <span>CakeForge</span>
        </a>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" th:href="@{/reviews/admin}">Review Admin</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="page-header container">
    <h1>Edit Review</h1>
    <p>Admin moderation update.</p>
</header>

<main class="container py-4">
    <div class="glass-card">
        <form th:action="@{/reviews/admin/edit/{id}(id=${review.reviewId})}" method="post">
            <div class="mb-3">
                <label class="form-label">Customer Name</label>
                <input type="text" name="customerName" class="form-control" th:value="${review.customerName}" maxlength="100" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Cake Name</label>
                <input type="text" name="cakeName" class="form-control" th:value="${review.cakeName}" maxlength="100" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Rating</label>
                <input type="number" min="1" max="5" name="rating" class="form-control" th:value="${review.rating}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Comment</label>
                <textarea name="comment" class="form-control" rows="5" maxlength="500" required th:text="${review.comment}"></textarea>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="approved" name="approved" th:checked="${review.approved}">
                <label class="form-check-label" for="approved">Approved (visible in testimonials)</label>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <a th:href="@{/reviews/admin}" class="btn btn-light border rounded-pill px-4">Cancel</a>
                <button type="submit" class="btn btn-primary rounded-pill px-4">Save Changes</button>
            </div>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

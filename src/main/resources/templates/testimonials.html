<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Reviews | CakeForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg cake-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/catalog}">
            <img th:src="@{/theme/img/logo.png}" alt="CakeForge" class="brand-logo">
            <span>CakeForge</span>
        </a>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/catalog}">Catalog</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/reviews/testimonials}">Reviews</a></li>
                <li class="nav-item" th:if="${session.user != null}"><a class="nav-link" th:href="@{/reviews/new}">Write Review</a></li>
                <li class="nav-item" th:if="${session.user != null}"><a class="nav-link" th:href="@{/reviews/manage}">My Reviews</a></li>
                <li class="nav-item" th:if="${session.admin != null}"><a class="nav-link" th:href="@{/reviews/admin}">Review Admin</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="page-header container">
    <h1>Customer Reviews</h1>
    <p>Real feedback from our customers.</p>
</header>

<main class="container py-4">
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon icon-pink"><i class="fa-solid fa-message"></i></div>
                <div class="stat-info">
                    <h3 th:text="${reviews != null ? reviews.size() : 0}">0</h3>
                    <p>Total Reviews</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon icon-green"><i class="fa-solid fa-star"></i></div>
                <div class="stat-info">
                    <h3 th:text="${averageRating == null ? '-' : #numbers.formatDecimal(averageRating, 1, 1)}">-</h3>
                    <p>Average Rating</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon icon-blue"><i class="fa-solid fa-certificate"></i></div>
                <div class="stat-info">
                    <h3>5</h3>
                    <p>Max Rating</p>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${errorMsg}" class="alert alert-danger glass-card border-0" th:text="${errorMsg}"></div>

    <div class="row g-3" th:if="${reviews != null and !reviews.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="r : ${reviews}">
            <div class="glass-card h-100">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="mb-0 fw-bold text-pink" th:text="${r.cakeName}">Cake</h5>
                    <span class="badge bg-light text-dark border" th:text="${r.stars}">⭐⭐⭐⭐⭐</span>
                </div>
                <p class="text-muted mb-3" th:text="${r.comment}">Comment</p>
                <div class="d-flex justify-content-between small text-muted border-top pt-3">
                    <span class="fw-semibold text-dark" th:text="${r.customerName}">Customer</span>
                    <span th:text="${r.datePosted}">Date</span>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${reviews == null or reviews.isEmpty()}" class="glass-card text-center py-5">
        <i class="fa-solid fa-comment-dots fa-3x text-muted mb-3"></i>
        <h4>No Reviews Yet</h4>
        <p class="text-muted mb-4">Be the first to share your feedback.</p>
        <a th:if="${session.user != null}" th:href="@{/reviews/new}" class="btn btn-primary rounded-pill px-4">Write Review</a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

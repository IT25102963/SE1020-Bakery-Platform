<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Moderation | CakeForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg cake-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/standard-catalog}">
            <img th:src="@{/theme/img/logo.png}" alt="CakeForge" class="brand-logo">
            <span>CakeForge</span>
        </a>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/bookings/my-orders}">Orders</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/delivery}">Delivery</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/reviews/admin}">Review Admin</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="page-header container">
    <h1>Review Moderation</h1>
    <p>Approve, edit, or remove customer reviews.</p>
</header>

<main class="container py-4">
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon icon-pink"><i class="fa-solid fa-comments"></i></div>
                <div class="stat-info"><h3 th:text="${reviews != null ? reviews.size() : 0}">0</h3><p>Total Reviews</p></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon icon-green"><i class="fa-solid fa-circle-check"></i></div>
                <div class="stat-info"><h3 th:text="${reviews != null ? reviews.?[approved].size() : 0}">0</h3><p>Approved</p></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon icon-blue"><i class="fa-solid fa-hourglass-half"></i></div>
                <div class="stat-info"><h3 th:text="${reviews != null ? reviews.?[!approved].size() : 0}">0</h3><p>Pending</p></div>
            </div>
        </div>
    </div>

    <div th:if="${successMsg}" class="alert alert-success glass-card border-0" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger glass-card border-0" th:text="${errorMsg}"></div>

    <div class="glass-card p-0 overflow-hidden">
        <div class="p-4 border-bottom"><h5 class="mb-0 fw-bold">All Reviews</h5></div>
        <div class="table-responsive" th:if="${reviews != null and !reviews.isEmpty()}">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Cake</th>
                    <th>Rating</th>
                    <th>Comment</th>
                    <th>Status</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${reviews}">
                    <td th:text="${r.reviewId}">RV-XXXX</td>
                    <td th:text="${r.customerName}">Customer</td>
                    <td th:text="${r.cakeName}">Cake</td>
                    <td th:text="${r.stars}">⭐⭐⭐⭐⭐</td>
                    <td class="text-muted" th:text="${r.comment}">Comment</td>
                    <td>
                        <span class="badge bg-success-subtle text-success border" th:if="${r.approved}">Approved</span>
                        <span class="badge bg-warning-subtle text-warning border" th:unless="${r.approved}">Pending</span>
                    </td>
                    <td class="text-center">
                        <div class="d-inline-flex gap-2 flex-wrap justify-content-center">
                            <form th:unless="${r.approved}" th:action="@{/reviews/admin/approve/{id}(id=${r.reviewId})}" method="post">
                                <button type="submit" class="btn btn-success btn-sm"><i class="fa-solid fa-check"></i></button>
                            </form>
                            <a th:href="@{/reviews/admin/edit/{id}(id=${r.reviewId})}" class="btn btn-light border btn-sm">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                            <form th:action="@{/reviews/admin/delete/{id}(id=${r.reviewId})}" method="post"
                                  onsubmit="return confirm('Delete this review permanently?')">
                                <button class="btn btn-outline-danger btn-sm" type="submit">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${reviews == null or reviews.isEmpty()}" class="text-center py-5 text-muted">
            No reviews available.
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

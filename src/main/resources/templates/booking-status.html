<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Order Status | CakeForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg cake-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/catalog}">
            <img th:src="@{/theme/img/logo.png}" alt="CakeForge logo" class="brand-logo">
            <span>CakeForge</span>
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/catalog}">Catalog</a>
            <a class="nav-link active" th:href="@{/bookings/my-orders}">Orders Dashboard</a>
        </div>
    </div>
</nav>

<header class="page-header">
    <div class="container">
        <h1><i class="fa-solid fa-arrows-rotate"></i> Update Order Status</h1>
        <p th:text="'Booking ID: ' + ${booking.bookingId}"></p>
    </div>
</header>

<main class="container py-4">
    <div class="card card-soft shadow-sm">
        <div class="card-body">
            <div class="mb-3">
                <strong>Customer:</strong> <span th:text="${booking.customerName}"></span> |
                <strong>Cake:</strong> <span th:text="${booking.cakeName}"></span>
            </div>

            <form th:action="@{/bookings/status/{id}(id=${booking.bookingId})}" method="post" class="row g-3 align-items-end">
                <div class="col-md-8">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select" required>
                        <option th:each="st : ${statusOptions}" th:value="${st}" th:text="${st}" th:selected="${st == booking.status}"></option>
                    </select>
                </div>
                <div class="col-md-4 d-grid">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-floppy-disk me-2"></i>Update Status
                    </button>
                </div>
            </form>

            <div class="mt-3 d-flex gap-2">
                <a th:href="@{/bookings/my-orders}" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left me-2"></i>Back
                </a>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Cake Request | CakeForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg cake-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/bookings/products}">
            <img th:src="@{/theme/img/logo.png}" alt="CakeForge" class="brand-logo">
            <span>CakeForge</span>
        </a>
    </div>
</nav>

<header class="page-header container">
    <h1>Custom Request</h1>
    <p>Tell us about your dream cake and we'll make it a reality.</p>
</header>

<main class="container py-4">
    <div class="glass-card max-width-800 mx-auto">
        <form th:action="@{/bookings/place-order}" th:object="${booking}" method="post">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Customer Name</label>
                    <input type="text" th:field="*{customerName}" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="text" th:field="*{phone}" class="form-control" required>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Cake Theme / Name</label>
                    <input type="text" th:field="*{cakeName}" class="form-control" placeholder="e.g. Unicorn Birthday, Wedding Tiers" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Quantity</label>
                    <input type="number" th:field="*{quantity}" class="form-control" min="1" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Order Details</label>
                    <textarea th:field="*{orderDetails}" class="form-control" rows="4" placeholder="Describe colors, flavors, and any special messages..."></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Order Type</label>
                    <select th:field="*{orderType}" class="form-select">
                        <option value="Standard">Standard</option>
                        <option value="Custom">Custom</option>
                    </select>
                </div>
            </div>
            
            <div class="mt-5 d-flex gap-3">
                <button type="submit" class="btn btn-primary btn-lg px-5">Submit Request</button>
                <a th:href="@{/bookings/products}" class="btn btn-light btn-lg border px-5">Cancel</a>
            </div>
        </form>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

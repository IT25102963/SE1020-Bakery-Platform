<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Cake | CakeForge Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .add-cake-card h2 {
            font-size: 1.45rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .toast-panel {
            background: var(--text-dark);
            border-radius: 14px;
            bottom: 24px;
            box-shadow: var(--shadow-md);
            color: #fff;
            font-weight: 700;
            opacity: 0;
            padding: 1rem 1.25rem;
            pointer-events: none;
            position: fixed;
            right: 24px;
            transform: translateY(16px);
            transition: all 0.25s ease;
            z-index: 1200;
        }

        .toast-panel.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast-panel.error {
            background: #d63031;
        }

        @media (max-width: 575.98px) {
            .page-header {
                padding-top: 2.5rem;
            }

            .page-header h1 {
                font-size: 2.25rem;
            }

            .toast-panel {
                left: 16px;
                right: 16px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg cake-navbar">
    <div class="container">
        <a class="navbar-brand" href="/catalog">
            <img src="/theme/img/logo.png" alt="CakeForge" class="brand-logo">
            <span>CakeForge</span>
        </a>
        <div class="ms-auto">
            <a href="/catalog" class="btn btn-outline-secondary btn-sm rounded-pill px-4">Back to Catalog</a>
        </div>
    </div>
</nav>

<header class="page-header container">
    <h1>Add New Cake</h1>
    <p>Create a standard cake item for the CakeForge catalog.</p>
</header>

<main class="container py-2">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-9">
            <div class="glass-card add-cake-card">
                <h2><i class="fa-solid fa-plus me-2 text-danger"></i>Add New Cake</h2>
                <form id="cakeForm">
                    <div class="mb-3">
                        <label for="cakeName" class="form-label fw-semibold">Cake Name</label>
                        <input type="text" class="form-control" id="cakeName" placeholder="Chocolate Truffle" required>
                    </div>
                    <div class="mb-3">
                        <label for="cakeCategory" class="form-label fw-semibold">Category</label>
                        <select class="form-select" id="cakeCategory">
                            <option value="Birthday">Birthday</option>
                            <option value="Wedding">Wedding</option>
                            <option value="Anniversary">Anniversary</option>
                            <option value="Celebration">Celebration</option>
                            <option value="Seasonal">Seasonal</option>
                            <option value="Custom">Custom</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="cakePrice" class="form-label fw-semibold">Price (LKR)</label>
                        <input type="number" class="form-control" id="cakePrice" placeholder="2500" min="0" step="0.01" required>
                    </div>
                    <div class="mb-4">
                        <label for="cakeDesc" class="form-label fw-semibold">Description</label>
                        <textarea class="form-control" id="cakeDesc" rows="4" placeholder="Rich layers, fresh cream, and signature finish"></textarea>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">
                        <i class="fa-solid fa-floppy-disk me-2"></i>Save Cake
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<div class="toast-panel" id="toast" role="status" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "/api/cakes";

    document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("cakeForm").addEventListener("submit", addCake);
    });

    async function addCake(event) {
        event.preventDefault();

        const name = document.getElementById("cakeName").value.trim();
        const category = document.getElementById("cakeCategory").value;
        const price = document.getElementById("cakePrice").value;
        const description = document.getElementById("cakeDesc").value.trim();

        if (!name) {
            showToast("Please enter a cake name", true);
            return;
        }

        if (!price || Number.isNaN(Number(price))) {
            showToast("Please enter a valid price", true);
            return;
        }

        try {
            const response = await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, category, price, description })
            });

            if (!response.ok) {
                const message = await response.text();
                throw new Error(message || "Error adding cake");
            }

            showToast("Cake saved successfully");
            window.setTimeout(function () {
                window.location.href = "/catalog";
            }, 650);
        } catch (error) {
            showToast(error.message || "Connection error", true);
        }
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "toast-panel show" + (isError ? " error" : "");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(function () {
            toast.className = "toast-panel";
        }, 3000);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Review – Admin | Sweet Layers Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --dark:   #1a1a2e;
            --panel:  #16213e;
            --card:   #0f3460;
            --gold:   #d4a84b;
            --rose:   #c0392b;
            --green:  #27ae60;
            --text:   #e8e8f0;
            --muted:  #8888aa;
            --border: rgba(255,255,255,0.10);
            --shadow: 0 10px 36px rgba(0,0,0,0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px 16px;
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .header {
            padding: 22px 26px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--gold);
        }

        .meta {
            color: var(--muted);
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        form { padding: 26px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .full { grid-column: 1 / -1; }

        label {
            display: block;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 700;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            outline: none;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
        }

        textarea { min-height: 140px; resize: vertical; }

        input:focus, textarea:focus {
            border-color: rgba(212,168,75,0.55);
            box-shadow: 0 0 0 3px rgba(212,168,75,0.12);
        }

        .row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
        }

        .checkbox {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            user-select: none;
            color: rgba(255,255,255,0.75);
            font-size: 14px;
        }

        .checkbox input { width: 18px; height: 18px; }

        .actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: 800;
            letter-spacing: 0.4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 160px;
            font-size: 13px;
        }

        .btn-save { background: var(--green); color: white; }
        .btn-save:hover { opacity: 0.9; }
        .btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); }
        .btn-cancel:hover { background: rgba(255,255,255,0.12); }

        .hint {
            margin-top: 12px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>✏️ Edit Review</h1>
        <div class="meta">
            <span th:text="${review.reviewId}">RV-XXXX</span>
            ·
            <span th:text="${review.datePosted}">2026-01-01</span>
        </div>
    </div>

    <form th:action="@{/reviews/admin/edit/{id}(id=${review.reviewId})}" method="post">
        <div class="grid">
            <div>
                <label for="customerName">Customer Name</label>
                <input id="customerName" name="customerName" type="text"
                       maxlength="100" required
                       th:value="${review.customerName}"/>
            </div>

            <div>
                <label for="cakeName">Cake / Product</label>
                <input id="cakeName" name="cakeName" type="text"
                       maxlength="100" required
                       th:value="${review.cakeName}"/>
            </div>

            <div>
                <label for="rating">Rating (1–5)</label>
                <input id="rating" name="rating" type="number"
                       min="1" max="5" required
                       th:value="${review.rating}"/>
            </div>

            <div class="row">
                <label class="checkbox" for="approved" style="margin:0;">
                    <input id="approved" name="approved" type="checkbox"
                           th:checked="${review.approved}"/>
                    Approved (visible on Testimonials)
                </label>
            </div>

            <div class="full">
                <label for="comment">Comment</label>
                <textarea id="comment" name="comment" maxlength="500" required
                          th:text="${review.comment}">Comment</textarea>
            </div>
        </div>

        <div class="actions">
            <a class="btn btn-cancel" href="/reviews/admin">← Back to Admin</a>
            <button class="btn btn-save" type="submit">Save Changes</button>
        </div>

        <div class="hint">
            Note: The review ID and date are preserved. Only the fields above are edited.
        </div>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | CakeCraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark cake-navbar">
    <div class="container">
        <a class="navbar-brand brand-mark d-flex align-items-center gap-2" th:href="@{/bookings/products}"><img th:src="@{/theme/img/logo.png}" alt="CakeCraft logo" class="brand-logo">CakeCraft</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/bookings/products}">Product List</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/bookings/my-orders}">My Orders</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="page-header">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
            <h1><i class="fa-solid fa-list-check"></i> My Orders</h1>
            <p>View and manage your booked orders.</p>
        </div>
        <a th:href="@{/bookings/products}" class="btn btn-warning btn-lg"><i class="fa-solid fa-cake-candles"></i> Product List</a>
    </div>
</header>

<main class="container py-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div class="empty-orders card card-soft" th:if="${#lists.isEmpty(bookings)}">
        <div class="card-body text-center py-5">
            <h4 class="mb-2">No Orders Yet</h4>
            <p class="text-muted mb-4">Start by selecting a cake from the product list.</p>
            <a th:href="@{/bookings/products}" class="btn btn-primary"><i class="fa-solid fa-cake-candles"></i> Browse Cakes</a>
        </div>
    </div>

    <div class="card card-soft shadow-sm" th:if="${!#lists.isEmpty(bookings)}">
        <div class="card-body table-responsive">
            <table class="table table-hover align-middle orders-table" th:if="${!#lists.isEmpty(bookings)}">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Cake</th>
                    <th>Order Details</th>
                    <th>Type</th>
                    <th>Qty</th>
                    <th>Booking</th>
                    <th>Delivery</th>
                    <th>Total</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="booking : ${bookings}">
                    <td><span class="order-id-pill" th:text="${booking.bookingId}"></span></td>
                    <td th:text="${booking.cakeName}"></td>
                    <td th:text="${booking.orderDetails}"></td>
                    <td th:text="${booking.orderType}"></td>
                    <td th:text="${booking.quantity}"></td>
                    <td th:text="${booking.bookingDate}"></td>
                    <td th:text="${booking.deliveryDate}"></td>
                    <td class="fw-semibold" th:text="${#numbers.formatDecimal(booking.totalPrice, 1, 'COMMA', 2, 'POINT')}"></td>
                    <td class="d-flex flex-wrap gap-1">
                        <a class="btn btn-sm btn-outline-primary btn-icon" title="Edit" th:href="@{/bookings/edit/{id}(id=${booking.bookingId})}"><i class="fa-solid fa-pen"></i></a>
                        <a class="btn btn-sm btn-outline-info btn-icon" title="Receipt" th:href="@{/bookings/receipt/{id}(id=${booking.bookingId})}"><i class="fa-solid fa-receipt"></i></a>
                        <a class="btn btn-sm btn-outline-danger js-confirm btn-icon" title="Delete"
                           th:href="@{/bookings/delete/{id}(id=${booking.bookingId})}"
                           data-confirm-message="Delete this booking permanently?">
                            <i class="fa-solid fa-trash"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer class="site-footer mt-5">

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>

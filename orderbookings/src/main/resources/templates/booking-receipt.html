<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Receipt | CakeCraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark cake-navbar">
    <div class="container">
        <a class="navbar-brand brand-mark d-flex align-items-center gap-2" th:href="@{/bookings/products}"><img th:src="@{/theme/img/logo.png}" alt="CakeCraft logo" class="brand-logo">CakeCraft</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/bookings/products}">Product List</a>
            <a class="nav-link" th:href="@{/bookings/my-orders}">My Orders</a>
            <a class="nav-link" th:href="@{/bookings/new}">Place Order</a>
        </div>
    </div>
</nav>

<header class="page-header">
    <div class="container">
        <h1><i class="fa-solid fa-receipt"></i> Booking Receipt</h1>
        <p th:text="'Receipt for Booking ID: ' + ${booking.bookingId}"></p>
    </div>
</header>

<main class="container py-4">
    <div class="card card-soft shadow-sm receipt-card mx-auto">
        <div class="card-body p-4">
            <h5 class="mb-3">CakeCraft Bakery</h5>
            <hr>
            <div class="row mb-2">
                <div class="col-6 fw-bold">Booking ID</div>
                <div class="col-6" th:text="${booking.bookingId}"></div>
            </div>
            <div class="row mb-2">
                <div class="col-6 fw-bold">Customer</div>
                <div class="col-6" th:text="${booking.customerName}"></div>
            </div>
            <div class="row mb-2">
                <div class="col-6 fw-bold">Phone</div>
                <div class="col-6" th:text="${booking.phone}"></div>
            </div>
            <div class="row mb-2">
                <div class="col-6 fw-bold">Cake</div>
                <div class="col-6" th:text="${booking.cakeName}"></div>
            </div>
            <div class="row mb-2">
                <div class="col-6 fw-bold">Order Details</div>
                <div class="col-6" th:text="${booking.orderDetails}"></div>
            </div>
            <div class="row mb-2">
                <div class="col-6 fw-bold">Order Type</div>
                <div class="col-6" th:text="${booking.orderType}"></div>
            </div>
            <div class="row mb-2">
                <div class="col-6 fw-bold">Quantity</div>
                <div class="col-6" th:text="${booking.quantity}"></div>
            </div>
            <div class="row mb-2">
                <div class="col-6 fw-bold">Booking Date</div>
                <div class="col-6" th:text="${booking.bookingDate}"></div>
            </div>
            <div class="row mb-2">
                <div class="col-6 fw-bold">Delivery Date</div>
                <div class="col-6" th:text="${booking.deliveryDate}"></div>
            </div>
            <div class="row mb-2">
                <div class="col-6 fw-bold">Total</div>
                <div class="col-6" th:text="${'LKR ' + #numbers.formatDecimal(booking.totalPrice, 1, 'COMMA', 2, 'POINT')}"></div>
            </div>

            <hr>
            <div class="d-flex gap-2">
                <a th:href="@{/bookings/my-orders}" class="btn btn-outline-secondary"><i class="fa-solid fa-arrow-left"></i> Back</a>
                <a th:href="@{/bookings/edit/{id}(id=${booking.bookingId})}" class="btn btn-primary"><i class="fa-solid fa-pen"></i> Edit</a>
            </div>
        </div>
    </div>
</main>

<footer class="site-footer mt-5">

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>

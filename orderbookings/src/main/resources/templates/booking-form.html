<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Booking | CakeCraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark cake-navbar">
    <div class="container">
        <a class="navbar-brand brand-mark d-flex align-items-center gap-2" th:href="@{/bookings/products}"><img th:src="@{/theme/img/logo.png}" alt="CakeCraft logo" class="brand-logo">CakeCraft</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/bookings/products}">Product List</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/bookings/my-orders}">My Orders</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/bookings/new}">Place Order</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="page-header">
    <div class="container">
        <h1><i class="fa-solid fa-plus"></i> Place Your Cake Order</h1>
        <p>Fill your order details and save to confirm booking.</p>
    </div>
</header>

<main class="container py-4">
    <div class="card card-soft shadow-sm">
        <div class="card-body">
            <form th:action="@{/bookings/save}" th:object="${booking}" method="post" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Customer Name</label>
                    <input type="text" th:field="*{customerName}" class="form-control" placeholder="Enter customer name">
                    <div class="text-danger small" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text"
                           th:field="*{phone}"
                           class="form-control"
                           placeholder="07XXXXXXXX"
                           inputmode="numeric"
                           minlength="10"
                           maxlength="10"
                           pattern="0[0-9]{9}"
                           title="Phone number must be exactly 10 digits and start with 0"
                           required>
                    <div class="text-danger small" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Cake Name</label>
                    <select th:field="*{cakeName}" class="form-select js-cake-name" id="cakeName">
                        <option value="">Select Cake</option>
                        <option th:each="cake : ${cakePrices.entrySet()}"
                                th:value="${cake.key}"
                                th:text="${cake.key + ' - LKR ' + #numbers.formatDecimal(cake.value, 1, 'COMMA', 2, 'POINT')}"
                                th:attr="data-price=${cake.value}"></option>
                    </select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('cakeName')}" th:errors="*{cakeName}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Order Details</label>
                    <textarea th:field="*{orderDetails}" class="form-control" rows="2" placeholder="Message on cake, flavor notes, event details, etc."></textarea>
                    <div class="text-danger small" th:if="${#fields.hasErrors('orderDetails')}" th:errors="*{orderDetails}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Order Type</label>
                    <select th:field="*{orderType}" class="form-select">
                        <option value="">Select Order Type</option>
                        <option th:each="ot : ${orderTypeOptions}" th:value="${ot}" th:text="${ot}"></option>
                    </select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('orderType')}" th:errors="*{orderType}"></div>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Quantity</label>
                    <input type="number" min="1" th:field="*{quantity}" id="quantity" class="form-control js-quantity">
                    <div class="text-danger small" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Order Date</label>
                    <input type="text" th:value="${booking.bookingDate}" class="form-control" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Estimated Delivery</label>
                    <input type="text" th:value="${booking.deliveryDate}" class="form-control" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Total Price (LKR)</label>
                    <input type="text" th:field="*{totalPrice}" id="totalPrice" class="form-control js-total-price" readonly>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save Booking</button>
                    <a th:href="@{/bookings/products}" class="btn btn-outline-secondary"><i class="fa-solid fa-arrow-left"></i> Back</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer class="site-footer mt-5">

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
